services:
  - type: web
    name: dora-bank-api
    env: java
    buildCommand: ./mvnw clean install
    startCommand: java -jar backend/target/dora-bank-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATA_MONGODB_ENABLED
        value: false
      - key: JWT_SECRET
        value: dora-bank-super-secret-jwt-key-for-production-256-bits-minimum-length-secure
      - key: CORS_ALLOWED_ORIGINS
        value: https://dora-bank-app.netlify.app
