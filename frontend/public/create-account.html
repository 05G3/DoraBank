<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Account - Dora Bank</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-logo"></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="create-account.html" class="active">Open Account</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="account-form-container">
        <div class="container">
            <h1>Open Your Account</h1>
            <form id="accountForm">
                <div class="form-group">
                    <label for="fullName">Full Name*</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email*</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number*</label>
                    <input type="tel" id="phone" required placeholder="9876543210">
                </div>

                <div class="form-group">
                    <label for="address">Address*</label>
                    <textarea id="address" required placeholder="123 Main St, City"></textarea>
                </div>

                <div class="form-group">
                    <label for="accountType">Account Type*</label>
                    <select id="accountType" required>
                        <option value="">Select Account Type</option>
                        <option value="savings">Savings Account</option>
                        <option value="checking">Checking Account</option>
                        <option value="credit">Credit Card Account</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="initialDeposit">Initial Deposit (₹)*</label>
                    <input type="number" id="initialDeposit" min="1000" required placeholder="Minimum ₹1000">
                </div>

                <div class="form-group">
                    <label for="password">Create Password*</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
        </div>
    </main>

    <script>
const API_BASE_URL = 'https://dora-bank-api.onrender.com/api';

document.getElementById('accountForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Get form values
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const accountType = document.getElementById('accountType').value;
    const initialDeposit = parseFloat(document.getElementById('initialDeposit').value);
    const password = document.getElementById('password').value;

    // Basic validation
    if (!validateEmail(email)) {
        alert('Please enter a valid email address');
        return;
    }
    if (!validatePhone(phone)) {
        alert('Phone number must be 10 digits');
        return;
    }
    if (initialDeposit < 1000) {
        alert('Minimum initial deposit is ₹1000');
        return;
    }
    if (password.length < 8) {
        alert('Password must be at least 8 characters');
        return;
    }

    // Send data to backend API
    try {
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fullName,
                email,
                phone,
                address,
                accountType,
                initialBalance: initialDeposit,
                password
            })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            alert(`Account created successfully! Your account number is: ${result.accountNumber || 'Will be generated'}`);
            window.location.href = 'login.html';
        } else {
            alert(`Account creation failed: ${result.message || result.error || 'Unknown error'}`);
            console.error('Server response:', result);
        }
    } catch (error) {
        console.error('Network error:', error);
        alert('Account creation failed. Please check your internet connection and try again.');
    }
});

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function validatePhone(phone) {
    return /^\d{10}$/.test(phone);
}
</script>
</body>
</html>
