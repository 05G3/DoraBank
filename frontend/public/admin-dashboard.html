<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Dora Bank</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* Admin Dashboard Overrides - Using Project Colors */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f9f9;
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Keep project header styles */
        .main-header {
            background-color: #0056b3;
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-logo {
            width: 150px;
            height: 40px;
            background-image: url('images/logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            padding-left: 0;
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        nav a:hover,
        nav a.active {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Admin Layout */
        .admin-shell {
            display: flex;
            min-height: calc(100vh - 70px);
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            flex-shrink: 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .logo {
            padding: 20px 24px;
            border-bottom: 1px solid #ddd;
        }
        .logo-mark {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 2px;
            color: #0056b3;
            text-transform: uppercase;
        }
        .logo-sub { 
            font-size: 10px; 
            color: #666; 
            letter-spacing: 3px; 
            margin-top: 4px; 
        }

        .nav { 
            flex: 1; 
            padding: 20px 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .nav-btn {
            background: none;
            border: none;
            color: #666;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
        }
        .nav-btn:hover { 
            background: #f0f0f0; 
            color: #333; 
        }
        .nav-btn.active { 
            background: rgba(0, 86, 179, 0.1); 
            color: #0056b3; 
            border-left: 3px solid #0056b3;
        }
        .nav-icon { 
            font-size: 16px; 
            width: 24px; 
            text-align: center; 
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid #ddd;
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
        }
        .status-dot {
            display: inline-block;
            width: 8px; 
            height: 8px;
            border-radius: 50%;
            background: #28a745;
            margin-right: 8px;
            box-shadow: 0 0 6px #28a745;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main Content */
        .admin-main {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            background: #f9f9f9;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #333;
        }
        .page-title span { color: #0056b3; }
        .page-time { 
            font-size: 11px; 
            color: #666; 
            letter-spacing: 1px; 
            margin-top: 8px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stat-card:hover { 
            transform: translateY(-3px); 
            border-color: #0056b3; 
            box-shadow: 0 4px 15px rgba(0,86,179,0.2);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent-color, #0056b3);
            opacity: 0.7;
        }
        .stat-card[data-color="purple"]::after { --accent-color: #6f42c1; }
        .stat-card[data-color="amber"]::after { --accent-color: #ffc107; }
        .stat-card[data-color="green"]::after { --accent-color: #28a745; }

        .stat-label { 
            font-size: 10px; 
            color: #666; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
        }
        .stat-value {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 34px;
            font-weight: 700;
            color: #333;
            line-height: 1;
        }
        .stat-icon {
            position: absolute;
            bottom: 16px; right: 20px;
            font-size: 32px;
            opacity: 0.1;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 28px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #666;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 28px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #333; }
        .tab-btn.active { 
            color: #0056b3; 
            border-bottom-color: #0056b3; 
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Search */
        .search-bar {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 18px;
            gap: 12px;
            margin-bottom: 24px;
            max-width: 420px;
            transition: border-color 0.2s;
        }
        .search-bar:focus-within { border-color: #0056b3; }
        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            width: 100%;
        }
        .search-bar input::placeholder { color: #999; }
        .search-icon { color: #999; font-size: 14px; }

        /* Table */
        .table-wrap {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            overflow-x: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 600px;
        }
        thead { background: #f8f9fa; }
        th {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #ddd;
        }
        td {
            padding: 16px 20px;
            font-size: 12px;
            color: #333;
            border-bottom: 1px solid #ddd;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #f8f9fa; }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .badge-debit { background: rgba(0, 86, 179, 0.1); color: #0056b3; }
        .badge-credit { background: rgba(111, 66, 193, 0.15); color: #6f42c1; }
        .badge-in { background: rgba(40, 167, 69, 0.1); color: #28a745; }
        .badge-out { background: rgba(220, 53, 69, 0.1); color: #dc3545; }

        .action-btn {
            background: rgba(0, 86, 179, 0.08);
            border: 1px solid rgba(0, 86, 179, 0.2);
            color: #0056b3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { 
            background: rgba(0, 86, 179, 0.18); 
            border-color: #0056b3;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .bank-card-scene {
            perspective: 1000px;
            height: 175px;
        }
        .bank-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        .bank-card-scene:hover .bank-card-inner { transform: rotateY(180deg); }
        .bank-card-front, .bank-card-back {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            backface-visibility: hidden;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }
        .bank-card-front { background: linear-gradient(135deg, #0056b3, #28a745); }
        .bank-card-front.purple { background: linear-gradient(135deg, #6f42c1, #e83e8c); }
        .bank-card-back {
            background: #f8f9fa;
            transform: rotateY(180deg);
            justify-content: center;
            gap: 12px;
            border: 1px solid #ddd;
        }

        /* Shimmer on card */
        .bank-card-front::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 60%);
            pointer-events: none;
        }
        .card-chip {
            width: 40px; height: 30px;
            background: linear-gradient(135deg, #d4af37, #f5d76e, #b8860b);
            border-radius: 6px;
            opacity: 0.9;
            position: absolute;
            top: 20px;
            left: 24px;
        }
        .card-logo {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 24px;
            font-weight: bold;
            color: #000000;
            opacity: 0.8;
        }
        .card-number {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 3px;
            color: #000000;
            margin: 45px 0 8px;
            font-weight: bold;
            text-align: center;
        }
        .card-holder { 
            font-size: 12px; 
            color: #000000; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }
        .card-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-top: auto;
        }
        .card-expiry { 
            font-size: 12px; 
            color: #000000; 
            font-weight: 600; 
        }
        .card-type { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: 1px; 
        }

        .card-stripe {
            background: rgba(0,0,0,0.7);
            height: 40px;
            border-radius: 4px;
        }

        /* Admin Dashboard Card Fixes - Override global styles */
        .admin-dashboard .card-item,
        .admin-dashboard .card-container {
            all: unset;
        }

        .admin-dashboard .bank-card-scene {
            perspective: 1000px;
            height: 175px !important;
            width: 100% !important;
            min-width: 300px !important;
        }

        .admin-dashboard .bank-card-inner {
            position: relative;
            width: 100% !important;
            height: 100% !important;
            min-width: 300px !important;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
        }

        .admin-dashboard .bank-card-front,
        .admin-dashboard .bank-card-back {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between;
            overflow: hidden;
            height: 175px !important;
            width: 100% !important;
            min-width: 300px !important;
            box-sizing: border-box;
        }

        .admin-dashboard .bank-card-front {
            background: linear-gradient(135deg, #0056b3, #28a745);
        }

        .admin-dashboard .bank-card-front.purple {
            background: linear-gradient(135deg, #6f42c1, #e83e8c);
        }

        .admin-dashboard .bank-card-back {
            background: #f8f9fa;
            transform: rotateY(180deg);
            justify-content: center;
            border: 1px solid #ddd;
        }

                .cvv-row { display: flex; justify-content: space-between; align-items: center; }
        .cvv-label { font-size: 10px; color: #666; letter-spacing: 2px; }
        .cvv-value { font-size: 16px; letter-spacing: 4px; color: #333; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 90%;
            max-width: 760px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            animation: modalIn 0.25s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        @keyframes modalIn {
            from { transform: translateY(20px) scale(0.97); opacity: 0; }
            to { transform: none; opacity: 1; }
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            color: #666;
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { background: #dc3545; color: #fff; }
        .modal-title {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #333;
        }
        .modal-section { margin-bottom: 28px; }
        .modal-section-title {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #0056b3;
            margin-bottom: 16px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-label { font-size: 10px; color: #666; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value { font-size: 13px; color: #333; }
        .info-value.accent { color: #0056b3; font-weight: 500; }

        /* Loading */
        .loading-msg, .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 12px;
            letter-spacing: 2px;
        }
        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 2px solid #ddd;
            border-top-color: #0056b3;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
        }

        .amount-pos { color: #28a745; font-weight: 500; }
        .amount-neg { color: #dc3545; font-weight: 500; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .sidebar { width: 70px; }
            .logo-mark, .logo-sub, .nav-btn span { display: none; }
            .nav-btn { justify-content: center; padding: 12px; }
            .nav-icon { width: auto; font-size: 20px; }
            .sidebar-footer { display: none; }
            .admin-main { padding: 20px; }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        </div>
    </div>

    <script>
        const API_BASE = 'https://dora-bank-api.onrender.com/api';
        let allUsers = [], allTxns = [], allCards = [];

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').innerHTML = d.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ' Â· ' + d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000); updateClock();

        function checkAuth() {
            const token = localStorage.getItem('jwt_token');
            const userInfo = localStorage.getItem('user_info');
            if (!token || !userInfo) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(userInfo);
            if (user.accountType !== 'admin') { alert('Admin access required'); window.location.href = 'login.html'; return false; }
            return true;
        }

        function logout() { localStorage.removeItem('jwt_token'); localStorage.removeItem('user_info'); window.location.href = 'login.html'; }

        async function apiFetch(endpoint, opts = {}) {
            const token = localStorage.getItem('jwt_token');
            const res = await fetch(API_BASE + endpoint, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                ...opts
            });
            if (res.status === 401 || res.status === 403) { logout(); return; }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        async function loadAll() { 
            await loadUsers(); 
            await loadCards(); 
            await loadTxns(); 
            updateStats(); 
        }
        async function loadUsers() { try { allUsers = await apiFetch('/admin/users'); } catch(e) { console.error('Error loading users:', e); allUsers = []; } renderAccountsTable(allUsers); }
        async function loadTxns() { try { allTxns = await apiFetch('/transactions/all'); } catch(e) { console.error('Error loading transactions:', e); allTxns = []; } renderTxnsTable(allTxns); }
        async function loadCards() { 
            console.log('Loading cards...');
            try { 
                // Try to get cards from all users
                allCards = [];
                for (const user of allUsers) {
                    try {
                        const userCards = await apiFetch(`/cards/user/${user.id}`);
                        if (Array.isArray(userCards)) {
                            // Add user name to each card
                            const cardsWithUser = userCards.map(card => ({
                                ...card,
                                userName: user.fullName || user.name
                            }));
                            allCards.push(...cardsWithUser);
                        }
                    } catch (e) {
                        console.log(`No cards for user ${user.id}`);
                    }
                }
                console.log('Cards loaded from users:', allCards);
            } catch(e) { 
                console.error('Error loading cards:', e); 
                allCards = []; 
            } 
            renderCardsGrid(allCards); 
        }

        function updateStats() {
            document.getElementById('stat-users').innerText = allUsers.length;
            const total = allUsers.reduce((s,u) => s + (u.balance||0), 0);
            document.getElementById('stat-balance').innerHTML = 'â‚¹' + total.toLocaleString('en-IN', {minimumFractionDigits:2});
            document.getElementById('stat-cards').innerText = allCards.length;
            document.getElementById('stat-txns').innerText = allTxns.length;
        }

        function renderAccountsTable(users) {
            const wrap = document.getElementById('accounts-table-wrap');
            if (!users.length) { wrap.innerHTML = '<div class="empty-state">NO ACCOUNTS FOUND</div>'; return; }
            wrap.innerHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Account No.</th><th>Balance</th><th>Status</th><th></th></tr></thead><tbody>${users.map(u => `<tr><td>${escHtml(u.fullName||u.name||'â€”')}</td><td style="color:var(--muted)">${escHtml(u.email||'â€”')}</td><td style="letter-spacing:1px">${escHtml(u.accountNumber||'â€”')}</td><td class="${(u.balance||0)>=0?'amount-pos':'amount-neg'}">â‚¹${(u.balance||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td><span class="badge badge-debit">${escHtml(u.status||'ACTIVE')}</span></td><td><button class="action-btn" onclick="openUserModal('${u.id||u._id}')">VIEW</button></td></tr>`).join('')}</tbody></table>`;
        }

        function renderTxnsTable(txns) {
            const wrap = document.getElementById('txns-table-wrap');
            if (!txns.length) { wrap.innerHTML = '<div class="empty-state">NO TRANSACTIONS FOUND</div>'; return; }
            wrap.innerHTML = `<table><thead><tr><th>Date</th><th>Account</th><th>Type</th><th>Amount</th><th>Description</th></tr></thead><tbody>${txns.map(t => { const amt = t.amount||0; const isIn = (t.type||'').toLowerCase().includes('credit') || amt>0; return `<tr><td style="color:var(--muted);font-size:11px">${fmtDate(t.timestamp||t.createdAt)}</td><td style="letter-spacing:1px">${escHtml(t.accountNumber||t.account||'â€”')}</td><td><span class="badge ${isIn?'badge-in':'badge-out'}">${escHtml(t.type||'â€”')}</span></td><td class="${isIn?'amount-pos':'amount-neg'}">${isIn?'+':'-'}â‚¹${Math.abs(amt).toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td style="color:var(--muted)">${escHtml(t.description||t.narration||'â€”')}</td></tr>` }).join('')}</tbody></table>`;
        }

        function renderCardsGrid(cards) {
            const grid = document.getElementById('cards-grid');
            if (!cards.length) { grid.innerHTML = '<div class="empty-state">NO CARDS FOUND</div>'; return; }
            grid.innerHTML = cards.map(c => {
                const isDebit = (c.cardType||c.type||'debit').toLowerCase().includes('debit');
                const num = (c.cardNumber||'**** **** **** ****').replace(/(.{4})/g,'$1 ').trim();
                const masked = num.replace(/\d(?=\d{4})/g,'â€¢');
                const holderName = c.userName || c.cardHolder || c.card_holder || c.holderName || 'CARDHOLDER';
                return `<div><div class="bank-card-scene"><div class="bank-card-inner"><div class="bank-card-front ${isDebit?'':'purple'}"><div class="card-chip"></div><div class="card-logo">DORA BANK</div><div class="card-number">${escHtml(masked)}</div><div class="card-holder">${escHtml(holderName)}</div><div class="card-row"><div class="card-expiry">EXP ${escHtml(c.expiryDate||c.expiry||'â€”')}</div><div class="card-type">${isDebit?'DEBIT':'CREDIT'}</div></div></div><div class="bank-card-back"><div class="card-stripe"></div><div class="cvv-row"><span class="cvv-label">CVV</span><span class="cvv-value">${escHtml(String(c.cvv||'â€¢â€¢â€¢'))}</span></div><div style="font-size:10px;color:#666;text-align:center">${escHtml(c.cardNumber||'â€”')}</div></div></div></div><div style="margin-top:10px;font-size:11px;color:#666;text-align:center">${escHtml(holderName)}</div></div>`;
            }).join('');
        }

        function filterAccounts() { const q = document.getElementById('search-accounts').value.toLowerCase(); renderAccountsTable(allUsers.filter(u => (u.fullName||u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q) || (u.accountNumber||'').toLowerCase().includes(q))); }
        function filterTxns() { const q = document.getElementById('search-txns').value.toLowerCase(); renderTxnsTable(allTxns.filter(t => (t.description||'').toLowerCase().includes(q) || (t.type||'').toLowerCase().includes(q) || (t.accountNumber||'').toLowerCase().includes(q))); }
        function filterCards() { const q = document.getElementById('search-cards').value.toLowerCase(); renderCardsGrid(allCards.filter(c => (c.cardHolder||c.card_holder||'').toLowerCase().includes(q) || (c.cardType||c.type||'').toLowerCase().includes(q))); }

        async function openUserModal(userId) {
            const overlay = document.getElementById('modal-overlay'), body = document.getElementById('modal-body');
            overlay.classList.add('open');
            body.innerHTML = '<div class="loading-msg"><div class="spinner"></div><br>Loading userâ€¦</div>';
            const user = allUsers.find(u => (u.id||u._id) == userId) || {};
            let userCards = [], userTxns = [];
            try { userCards = await apiFetch(`/cards/user/${userId}`); } catch { userCards = allCards.filter(c => (c.userId||c.user_id)==userId); }
            try { userTxns = await apiFetch(`/transactions/user/${userId}`); } catch { userTxns = allTxns.filter(t => (t.userId||t.user_id)==userId).slice(0,10); }
            userTxns = userTxns.slice(0,10);
            body.innerHTML = `<div class="modal-title">User Details</div><div class="modal-section"><div class="modal-section-title">Personal Information</div><div class="info-grid"><div><div class="info-label">Full Name</div><div class="info-value">${escHtml(user.fullName||user.name||'â€”')}</div></div><div><div class="info-label">Email</div><div class="info-value">${escHtml(user.email||'â€”')}</div></div><div><div class="info-label">Account Number</div><div class="info-value accent">${escHtml(user.accountNumber||'â€”')}</div></div><div><div class="info-label">Balance</div><div class="info-value accent">â‚¹${(user.balance||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div><div><div class="info-label">Phone</div><div class="info-value">${escHtml(user.phoneNumber||user.phone||'â€”')}</div></div><div><div class="info-label">Account Type</div><div class="info-value">${escHtml(user.accountType||'â€”')}</div></div></div></div>${userCards.length ? `<div class="modal-section"><div class="modal-section-title">Cards (${userCards.length})</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px">${userCards.map(c => { const isDebit = (c.cardType||c.type||'debit').toLowerCase().includes('debit'); const num = (c.cardNumber||'****'); const masked = num.replace(/\d(?=\d{4})/g,'â€¢'); return `<div class="bank-card-scene" style="height:145px"><div class="bank-card-inner"><div class="bank-card-front ${isDebit?'':'purple'}" style="padding:16px"><div class="card-chip" style="width:30px;height:22px"></div><div><div class="card-number" style="font-size:12px">${escHtml(masked)}</div><div class="card-holder" style="font-size:10px">${escHtml(c.cardHolder||c.card_holder||'CARDHOLDER')}</div></div><div class="card-row"><div class="card-expiry">${escHtml(c.expiryDate||c.expiry||'â€”')}</div><div class="card-type">${isDebit?'DEBIT':'CREDIT'}</div></div></div><div class="bank-card-back"><div class="card-stripe"></div><div class="cvv-row"><span class="cvv-label">CVV</span><span class="cvv-value">${escHtml(String(c.cvv||'â€¢â€¢â€¢'))}</span></div></div></div></div>`; }).join('')}</div></div>` : ''}${userTxns.length ? `<div class="modal-section"><div class="modal-section-title">Recent Transactions</div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th></tr></thead><tbody>${userTxns.map(t => { const amt = t.amount||0; const isIn = (t.type||'').toLowerCase().includes('credit'); return `<tr><td style="font-size:11px">${fmtDate(t.timestamp||t.createdAt)}</td><td><span class="badge ${isIn?'badge-in':'badge-out'}">${escHtml(t.type||'â€”')}</span></td><td class="${isIn?'amount-pos':'amount-neg'}">${isIn?'+':'-'}â‚¹${Math.abs(amt).toLocaleString('en-IN',{minimumFractionDigits:2})}</td><td>${escHtml(t.description||'â€”')}</td></tr>`; }).join('')}</tbody></table></div></div>` : '<div style="color:var(--muted);padding:20px;text-align:center">NO TRANSACTIONS</div>'}`;
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
        function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
        function escHtml(s) { return String(s).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function fmtDate(d) { if (!d) return 'â€”'; const dt = new Date(d); return isNaN(dt) ? String(d) : dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
        
        function setTab(name, btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            if(name !== 'overview') switchTab(name);
        }
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => { if(b.innerText.toLowerCase().includes(name)) b.classList.add('active'); });
            document.getElementById('panel-' + name).classList.add('active');
        }
        
        if(checkAuth()) loadAll();
    </script>
</body>
</html>
