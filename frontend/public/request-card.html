<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Card - Dora Bank</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-logo"></div>
            <nav>
                <ul>
                    <li><a href="user-dashboard.html">Dashboard</a></li>
                    <li><a href="request-card.html" class="active">Cards</a></li>
                    <li><a href="#" onclick="logout()">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="card-request-container">
        <div class="container">
            <h1>Request New Card</h1>
            
            <form id="cardRequestForm">
                <div class="form-group">
                    <label for="cardType">Card Type</label>
                    <select id="cardType" required>
                        <option value="">Select Card Type</option>
                        <option value="debit">Debit Card</option>
                        <option value="credit">Credit Card</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cardDesign">Card Design</label>
                    <select id="cardDesign" required>
                        <option value="">Select Card Design</option>
                        <option value="classic">Classic (Blue)</option>
                        <option value="gold">Gold</option>
                        <option value="platinum">Platinum</option>
                        <option value="black">Black Premium</option>
                        <option value="rose-gold">Rose Gold</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label for="streetAddress">Street Address</label>
                    <input type="text" id="streetAddress" required>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" required>
                </div>

                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" required>
                </div>

                <div class="form-group">
                    <label for="postalCode">Postal Code</label>
                    <input type="text" id="postalCode" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <button type="submit" class="btn btn-primary">Submit Request</button>
            </form>
            
            <div id="cardResult" class="card-result-container"></div>
        </div>
    </main>

    <script>
const API_BASE_URL = 'https://dora-bank-api.onrender.com/api';

function logout() {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('user_info');
    window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('jwt_token');
    const userInfo = localStorage.getItem('user_info');
    
    if (!token || !userInfo) {
        window.location.href = 'login.html';
        return;
    }
    
    const user = JSON.parse(userInfo);
    
    // Pre-fill user information if available
    if (user.fullName) {
        document.getElementById('fullName').value = user.fullName;
    }
    if (user.phone) {
        document.getElementById('phone').value = user.phone;
    }
    if (user.address) {
        // Parse address if it's stored as an object
        if (typeof user.address === 'object') {
            document.getElementById('streetAddress').value = user.address.street || '';
            document.getElementById('city').value = user.address.city || '';
            document.getElementById('state').value = user.address.state || '';
            document.getElementById('postalCode').value = user.address.postalCode || '';
        } else {
            // If address is stored as a string, put it in street address
            document.getElementById('streetAddress').value = user.address;
        }
    }

    document.getElementById('cardRequestForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const cardType = document.getElementById('cardType').value;
        const design = document.getElementById('cardDesign').value;
        const fullName = document.getElementById('fullName').value;
        const streetAddress = document.getElementById('streetAddress').value;
        const city = document.getElementById('city').value;
        const state = document.getElementById('state').value;
        const postalCode = document.getElementById('postalCode').value;
        const phone = document.getElementById('phone').value;
        
        const deliveryAddress = `${streetAddress}, ${city}, ${state} ${postalCode}`;
        
        try {
            const response = await fetch(`${API_BASE_URL}/cards/request`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    cardType,
                    cardDesign: design,
                    deliveryAddress,
                    fullName,
                    phone,
                    accountNumber: user.accountNumber
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                alert('Card request submitted successfully! Your card will be delivered to: ' + deliveryAddress);
                document.getElementById('cardRequestForm').reset();
                // Pre-fill user info again
                if (user.fullName) {
                    document.getElementById('fullName').value = user.fullName;
                }
                if (user.phone) {
                    document.getElementById('phone').value = user.phone;
                }
            } else {
                alert('Card request failed: ' + (data.message || 'Unknown error'));
            }
        } catch (error) {
            console.error('Error requesting card:', error);
            alert('Card request failed. Please try again.');
        }
    });

});
</script>
</body>
</html>
