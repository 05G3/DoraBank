[build]
  publish = "public"
  command = "echo 'No build command needed for static site'"

[[redirects]]
  from = "/api/*"
  to = "https://dora-bank-api.onrender.com/api/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
