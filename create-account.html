<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Account - Dora Bank</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-logo"></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="create-account.html" class="active">Open Account</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="account-form-container">
        <div class="container">
            <h1>Open Your Account</h1>
            <form id="accountForm">
                <div class="form-group">
                    <label for="fullName">Full Name*</label>
                    <input type="text" id="fullName" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email*</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number*</label>
                    <input type="tel" id="phone" required placeholder="9876543210">
                </div>

                <div class="form-group">
                    <label for="address">Address*</label>
                    <textarea id="address" required placeholder="123 Main St, City"></textarea>
                </div>

                <div class="form-group">
                    <label for="accountType">Account Type*</label>
                    <select id="accountType" required>
                        <option value="">Select Account Type</option>
                        <option value="savings">Savings Account</option>
                        <option value="checking">Checking Account</option>
                        <option value="credit">Credit Card Account</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="initialDeposit">Initial Deposit (₹)*</label>
                    <input type="number" id="initialDeposit" min="1000" required placeholder="Minimum ₹1000">
                </div>

                <div class="form-group">
                    <label for="password">Create Password*</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="userPhoto">Profile Photo*</label>
                    <input type="file" id="userPhoto" accept="image/*" required>
                    <div id="photoPreview" style="display: none; margin-top: 10px;">
                        <img id="previewImage" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #0056b3;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
        </div>
    </main>

    <script>
    // Debug script loading
    console.log('=== CREATE ACCOUNT DEBUGGING ===');
    console.log('BankDB available:', typeof BankDB !== 'undefined');
    console.log('Validation functions available:', {
        validateEmail: typeof validateEmail,
        validatePhone: typeof validatePhone
    });
    
    // Photo preview functionality
    document.getElementById('userPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('photoPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });
    
    // Make sure BankDB is available
    if (typeof BankDB === 'undefined') {
        console.error('BankDB not loaded!');
        alert('Error: BankDB not loaded. Please refresh the page.');
    }

    document.getElementById('accountForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        console.log('Form submitted');
        
        // Get form values
        const accountType = document.getElementById('accountType').value;
        const initialDeposit = parseFloat(document.getElementById('initialDeposit').value);
        const password = document.getElementById('password').value;
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const photoFile = document.getElementById('userPhoto').files[0];
        
        console.log('Form values:', { accountType, initialDeposit, email, phone });
    
        if (!validateEmail(email)) {
            alert('Please enter a valid email address');
            return;
        }
    
        if (!validatePhone(phone)) {
            alert('Phone number must be 10 digits');
            return;
        }
        
        if (!photoFile) {
            alert('Please select a profile photo');
            return;
        }
        
        // Validate minimum deposit
        if (initialDeposit < 1000) {
            alert('Minimum initial deposit is ₹1000');
            return;
        }
        
        // Validate password strength
        if (password.length < 8) {
            alert('Password must be at least 8 characters');
            return;
        }
        
        // Convert photo to base64
        const reader = new FileReader();
        reader.onload = function(e) {
            const photoData = e.target.result;
            
            // Generate unique account number
            const accountNumber = generateAccountNumber(accountType);
            console.log('Generated account number:', accountNumber);
            
            // Create user object
            const user = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
                accountType: accountType,
                balance: initialDeposit.toFixed(2),
                accountNumber: accountNumber,
                password: password,
                photo: photoData,
                cards: []
            };
            
            console.log('User object created:', user);
            
            try {
                // Add user through BankDB module
                console.log('Adding user to BankDB...');
                const addedUser = BankDB.addUser(user);
                console.log('User added successfully:', addedUser);
                
                if (addedUser) {
                    // Show success message before redirect
                    alert(`Account created successfully!\nYour account number: ${accountNumber}`);
                    window.location.href = `account-created.html?acc=${accountNumber}`;
                } else {
                    throw new Error('Failed to create account');
                }
            } catch (error) {
                console.error('Account creation error:', error);
                alert('Account creation failed. Please try again.\n' + error.message);
            }
        };
        reader.readAsDataURL(photoFile);
    });
    
    function generateAccountNumber(type) {
        const prefixes = {
            savings: 'DORA-SAV',
            checking: 'DORA-CHK',
            credit: 'DORA-CCD'
        };
        const prefix = prefixes[type] || 'DORA-ACC';
        
        // Generate random but check for uniqueness
        let accountNumber;
        let attempts = 0;
        const maxAttempts = 10;
        
        do {
            accountNumber = `${prefix}-${Math.floor(1000 + Math.random() * 9000)}`;
            attempts++;
            
            if (attempts >= maxAttempts) {
                throw new Error('Could not generate unique account number');
            }
        } while (BankDB.getUserByAccount(accountNumber));
        
        return accountNumber;
    }
</script>
</body>
</html>
