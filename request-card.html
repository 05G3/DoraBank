<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Card - Dora Bank</title>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            color: #1e293b;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(135deg, #0056b3 0%, #007bff 100%);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: url('images/logo-white.png') center/contain no-repeat;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tagline {
            font-size: 14px;
            opacity: 0.9;
        }

        .screen {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-top: -10px;
            position: relative;
            z-index: 2;
        }

        .form-container {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0056b3;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }
        
        input[readonly] {
            background: #e9ecef !important;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0056b3 0%, #007bff 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 86, 179, 0.3);
        }

        .confirmation {
            background: #e7f5ff;
            border: 2px solid #0056b3;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            color: #0056b3;
            font-weight: 600;
        }

        .navigation {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            z-index: 100;
        }

        .nav-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #f3f4f6;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #0056b3 0%, #007bff 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">DoraBank</div>
            <div class="tagline">Your Digital Banking Partner</div>
        </div>

        <div class="screen active" id="application-screen">
            <div class="form-container">
                <h2 style="margin-bottom: 25px; color: #0056b3;">Request New Card</h2>
                
                <form id="card-form">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" value="" readonly>
                    </div>

                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <input type="text" id="address" placeholder="Enter your full address" required>
                    </div>

                    <div class="form-group">
                        <label for="cardType">Card Type</label>
                        <select id="cardType" required>
                            <option value="">Select Card Type</option>
                            <option value="debit">Debit Card</option>
                            <option value="credit">Credit Card</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Application</button>
                </form>

                <div id="confirmation" class="confirmation" style="display: none;">
                    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" style="flex-shrink: 0;">
                            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span>Your card request has been submitted! Redirecting...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <a href="request-card.html" class="nav-btn active">Apply</a>
        <a href="user-dashboard.html" class="nav-btn">Dashboard</a>
        <a href="admin-dashboard.html" class="nav-btn">Admin</a>
    </div>

    <script>
        function generateCardNumber() {
            let number = '4'; // VISA
            for(let i=0; i<15; i++) {
                number += Math.floor(Math.random() * 10);
            }
            return number;
        }

        function generateExpiryDate() {
            const now = new Date();
            const year = now.getFullYear() + 4;
            const month = now.getMonth() + 1;
            return (month < 10 ? '0' + month : month) + '/' + year.toString().slice(-2);
        }

        function generateCVV() {
            return Math.floor(100 + Math.random() * 900).toString();
        }

        document.addEventListener('DOMContentLoaded', function() {
            const user = checkAuth();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Populate user details
            const fullNameInput = document.getElementById('fullName');
            if (fullNameInput) {
                fullNameInput.value = user.fullName;
            }
            const addressInput = document.getElementById('address');
            if (addressInput) {
                addressInput.value = user.address || '';
            }

            // Handle Admin link visibility
            const adminNav = document.querySelector('a[href="admin-dashboard.html"]');
            if(user.accountType !== 'admin') {
                adminNav.style.display = 'none';
            }
        });
        
        document.getElementById('card-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = getCurrentUser();
            if (!user) {
                alert("Session expired. Please log in again.");
                window.location.href = 'login.html';
                return;
            }

            const address = document.getElementById('address').value;
            const cardType = document.getElementById('cardType').value;
            
            if (address && cardType) {
                const cardDetails = {
                    accountNumber: user.accountNumber,
                    cardHolder: user.fullName,
                    cardNumber: generateCardNumber(),
                    expiryDate: generateExpiryDate(),
                    cvv: generateCVV(),
                    type: cardType,
                    status: 'Active',
                    issueDate: new Date().toISOString().split('T')[0]
                };

                try {
                    BankDB.addCard(cardDetails);
                    
                    document.getElementById('confirmation').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'user-dashboard.html';
                    }, 2500);

                } catch (error) {
                    console.error("Failed to save card:", error);
                    alert("There was an error submitting your request. Please try again.");
                }
            }
        });
    </script>
</body>
</html>
